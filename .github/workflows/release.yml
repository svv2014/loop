name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract changelog section
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          NOTES=$(awk "/^## \[${VERSION}\]/{found=1; next} found && /^## \[/{exit} found{print}" CHANGELOG.md)
          if [ -z "$NOTES" ]; then
            echo "ERROR: No CHANGELOG.md section found for version ${VERSION}" >&2
            echo "Update CHANGELOG.md with a '## [${VERSION}]' section before pushing this tag." >&2
            exit 1
          fi
          echo "$NOTES" > /tmp/release-notes.md
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --repo "${{ github.repository }}" \
            --title "Loop ${{ github.ref_name }}" \
            --notes-file /tmp/release-notes.md

      - name: Attach install.sh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ github.ref_name }}" install.sh \
            --repo "${{ github.repository }}"
