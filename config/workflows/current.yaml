# Loop "current" workflow — exact mirror of legacy svv2014 label vocabulary.
#
# This workflow uses the label names that were in active use across
# svv2014's projects when Loop replaced the prior `asdlc` codebase. It
# exists so existing projects can switch to `workflow: current` in
# projects.yaml without any in-flight ticket getting stranded by a
# label-name change.
#
# New projects should prefer `default.yaml`. This workflow is preserved
# for the migration window and may eventually be deprecated.
#
# Differences from `default.yaml`:
#   - `plan` becomes `dev` (legacy issue trigger)
#
# All other label names are identical between `current` and `default`
# at the time of v0.1.0; this file is here so the migration is explicit
# and any future divergence is captured cleanly.

version: 1
name: current
description: |
  Legacy-vocabulary workflow that mirrors the label set in active use
  across svv2014 projects at the v0.1.0 migration. Use this when porting
  an existing repo with in-flight tickets so no label-name change is
  required during cutover.

issue_stages:
  - id: po
    trigger_label: po-review
    handler: po-handler
    on_done: dev
    on_blocked: blocked
    on_clarification: needs-clarification

  - id: dev
    trigger_label: dev
    handler: dev-handler
    on_done: needs-review
    on_failed_after_max: blocked

pr_stages:
  - id: review
    trigger_label: needs-review
    handler: review-handler
    decisions:
      approve: needs-qa
      reject: needs-rework

  - id: rework
    trigger_label: needs-rework
    handler: dev-rework-handler
    on_done: needs-review
    on_failed_after_max: blocked

  - id: qa
    trigger_label: needs-qa
    handler: qa-handler
    on_pass: qa-pass
    on_fail: qa-fail

  - id: merge
    trigger_label: qa-pass
    handler: merge-handler
    on_done: done
