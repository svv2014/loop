name: Bug Report
description: Something is broken or behaves incorrectly
title: "[Bug]: "
labels: ["bug", "p2-medium"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What's wrong? What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. Observe: ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: env
    attributes:
      label: Environment
      placeholder: Browser + version, screen size, or "N/A for content bug"
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, logs, references.
    validations:
      required: false
